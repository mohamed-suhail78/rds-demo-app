name: Deploy to ECS Fargate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t new-repo .
          docker tag new-repo:latest 716525550340.dkr.ecr.ap-south-1.amazonaws.com/new-repo:latest

      - name: Push Docker Image
        run: |
          docker push 716525550340.dkr.ecr.ap-south-1.amazonaws.com/new-repo:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
          --cluster outstanding-deer-3ja5iz \
          --service sit-uat-service-v4dcgajt \
          --force-new-deployment